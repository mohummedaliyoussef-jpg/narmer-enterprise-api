version: '3.8'
services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://narmer:narmer123@db/narmer_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-production-secret
    depends_on:
      - db
      - redis
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: narmer
      POSTGRES_PASSWORD: narmer123
      POSTGRES_DB: narmer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
